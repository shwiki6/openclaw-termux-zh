name: Build OpenClaw Apps

on:
  push:
    branches: ['*']
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - 'scripts/build-apk.sh'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - 'scripts/build-apk.sh'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create a GitHub Release after the cloud build succeeds'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      version: ${{ steps.collect.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install host build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils curl unzip xz-utils zstd

      - name: Install Android SDK packages
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "$GITHUB_ENV"

          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "${SDK_ROOT}/cmdline-tools" -path '*/bin/sdkmanager' -type f 2>/dev/null | sort -V | tail -n 1 || true)"
          fi

          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager was not found under ${SDK_ROOT}/cmdline-tools"
            find "$SDK_ROOT" -maxdepth 4 -type f -name sdkmanager 2>/dev/null || true
            exit 1
          fi

          echo "$(dirname "$SDKMANAGER")" >> "$GITHUB_PATH"
          set +o pipefail
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358"

          test -f "${SDK_ROOT}/platforms/android-36/android.jar"
          test -d "${SDK_ROOT}/ndk/28.2.13676358"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Prepare Android local properties
        working-directory: flutter_app
        run: |
          set -euo pipefail
          FLUTTER_SDK="$(dirname "$(dirname "$(command -v flutter)")")"
          APP_VERSION="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
          VERSION_NAME="${APP_VERSION%%+*}"
          VERSION_CODE="${APP_VERSION##*+}"
          if [ "$VERSION_CODE" = "$VERSION_NAME" ]; then
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi

          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "flutter.sdk=${FLUTTER_SDK}"
            echo "flutter.versionName=${VERSION_NAME}"
            echo "flutter.versionCode=${VERSION_CODE}"
          } > android/local.properties

          flutter --version
          java -version

      - name: Generate Gradle wrapper
        working-directory: flutter_app/android
        run: |
          set -euo pipefail
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1 --distribution-type all
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter_app/android/**/*.gradle*', 'flutter_app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "No KEYSTORE_BASE64 secret found; release artifacts will use the debug signing fallback."
            exit 0
          fi

          for name in KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: $name is required when KEYSTORE_BASE64 is set."
              exit 1
            fi
          done

          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=${{ github.workspace }}/release.jks"
          } > flutter_app/android/key.properties

      - name: Fetch PRoot binaries
        run: bash scripts/fetch-proot-binaries.sh

      - name: Verify PRoot binaries
        run: |
          set -euo pipefail
          echo "Checking jniLibs contents..."
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for lib in libproot.so libprootloader.so libprootloader32.so libtalloc.so; do
              FILE="flutter_app/android/app/src/main/jniLibs/${abi}/${lib}"
              if [ ! -f "$FILE" ]; then
                echo "ERROR: Missing $FILE"
                exit 1
              fi
              SIZE=$(stat -c%s "$FILE")
              if [ "$SIZE" -lt 1000 ]; then
                echo "WARN: $FILE looks like a placeholder (${SIZE} bytes)"
              else
                echo "OK: $FILE (${SIZE} bytes)"
              fi
            done
          done

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze Dart code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build fat APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Build per-ABI APKs
        working-directory: flutter_app
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        working-directory: flutter_app
        run: flutter build appbundle --release

      - name: Verify APK native PRoot binaries
        run: |
          set -euo pipefail
          check_apk() {
            local apk="$1"
            local abi="$2"
            for lib in libproot.so libprootloader.so libprootloader32.so libtalloc.so; do
              if ! unzip -l "$apk" "lib/${abi}/${lib}" | grep -q "lib/${abi}/${lib}"; then
                echo "ERROR: Missing lib/${abi}/${lib} in $apk"
                exit 1
              fi
            done
          }

          check_apk flutter_app/build/app/outputs/flutter-apk/app-release.apk arm64-v8a
          check_apk flutter_app/build/app/outputs/flutter-apk/app-release.apk armeabi-v7a
          check_apk flutter_app/build/app/outputs/flutter-apk/app-release.apk x86_64
          check_apk flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk arm64-v8a
          check_apk flutter_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk armeabi-v7a
          check_apk flutter_app/build/app/outputs/flutter-apk/app-x86_64-release.apk x86_64

      - name: Collect artifacts
        id: collect
        run: |
          set -euo pipefail
          VERSION="$(awk '/^version:/ {print $2; exit}' flutter_app/pubspec.yaml | cut -d'+' -f1)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p artifacts

          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
            "artifacts/OpenClaw-v${VERSION}-universal.apk"

          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="flutter_app/build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "artifacts/OpenClaw-v${VERSION}-${abi}.apk"
            fi
          done

          AAB="flutter_app/build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB" ]; then
            cp "$AAB" "artifacts/OpenClaw-v${VERSION}.aab"
          fi

          echo "### Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in artifacts/*; do
            SIZE="$(du -h "$f" | cut -f1)"
            echo "| \`$(basename "$f")\` | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          done
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-aab
          path: artifacts/*.aab
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.collect.outputs.version }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = [
              `## Build Successful`,
              ``,
              `**Version:** \`v${version}\``,
              ``,
              `### Download APKs`,
              ``,
              `| Architecture | Download |`,
              `|---|---|`,
              `| arm64-v8a (recommended) | [OpenClaw-v${version}-arm64-v8a.apk](${runUrl}#artifacts) |`,
              `| armeabi-v7a (32-bit) | [OpenClaw-v${version}-armeabi-v7a.apk](${runUrl}#artifacts) |`,
              `| x86_64 (emulator) | [OpenClaw-v${version}-x86_64.apk](${runUrl}#artifacts) |`,
              `| Universal (all ABIs) | [OpenClaw-v${version}-universal.apk](${runUrl}#artifacts) |`,
              `| App Bundle (Play Store) | [OpenClaw-v${version}.aab](${runUrl}#artifacts) |`,
              ``,
              `> Download from [**Actions Artifacts**](${runUrl}#artifacts)`,
              ``,
              `---`,
              `*Built from ${process.env.GITHUB_SHA.substring(0, 7)} by [GitHub Actions](${runUrl})*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Build Successful')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment build failure on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## Build Failed`,
                ``,
                `The build failed for commit ${process.env.GITHUB_SHA.substring(0, 7)}.`,
                ``,
                `[View build logs](${runUrl})`,
              ].join('\n'),
            });

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: openclaw-apks
          path: artifacts

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-aab
          path: artifacts

      - name: Get version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(awk '/^version:/ {print $2; exit}' flutter_app/pubspec.yaml | cut -d'+' -f1)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenClaw v${{ steps.version.outputs.version }}
          body: |
            ## OpenClaw Android v${{ steps.version.outputs.version }}

            Standalone Android app — no Termux required.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `OpenClaw-v${{ steps.version.outputs.version }}-arm64-v8a.apk` | Most modern Android phones (recommended) |
            | `OpenClaw-v${{ steps.version.outputs.version }}-armeabi-v7a.apk` | Older 32-bit ARM devices |
            | `OpenClaw-v${{ steps.version.outputs.version }}-x86_64.apk` | Emulators / x86 devices |
            | `OpenClaw-v${{ steps.version.outputs.version }}-universal.apk` | All architectures (larger) |
            | `OpenClaw-v${{ steps.version.outputs.version }}.aab` | Android App Bundle (Play Store) |

            ### First Run
            1. Install the APK
            2. Follow the setup wizard (downloads ~500MB Ubuntu rootfs)
            3. Start the gateway from the dashboard
            4. Access the web dashboard at `http://127.0.0.1:18789`

            ### Requirements
            - Android 10+ (API 29)
            - ~500MB free storage for initial setup
            - Internet connection for first-time setup
          files: artifacts/*
          draft: false
          prerelease: false
