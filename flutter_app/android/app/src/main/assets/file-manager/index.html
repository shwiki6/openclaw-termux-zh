<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>文件管理</title>
  <script src="/assets/vendor/tailwind-browser.js"></script>
  <script src="/assets/vendor/lucide.min.js"></script>
  <script src="/assets/vendor/ace/ace.js"></script>
  <script src="/assets/vendor/docs/marked.umd.js"></script>
  <script src="/assets/vendor/docs/mammoth.browser.min.js"></script>
  <script src="/assets/vendor/docs/xlsx.full.min.js"></script>
  <script src="/assets/vendor/docs/jszip.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body, #app {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      background: #09090b;
      color: #f4f4f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      letter-spacing: 0;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    #panes {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      flex: 1 1 0;
      height: 0;
      min-height: 0;
      overflow: hidden;
    }

    #left,
    #right {
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
    }

    .fm-scroll,
    .fm-list {
      flex: 1 1 0;
      height: 0;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }

    .fm-scroll::-webkit-scrollbar,
    .fm-list::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .fm-scroll::-webkit-scrollbar-thumb,
    .fm-list::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 999px;
    }

    .fm-roots {
      display: flex;
      gap: 4px;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-x;
    }

    .fm-roots::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .fm-pane {
      display: flex;
      height: 100%;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      background: #09090b;
    }

    .fm-pane.active {
      box-shadow: inset 0 0 0 1px rgba(185, 28, 28, 0.55);
    }

    .fm-pane-head {
      display: flex;
      height: 58px;
      flex-shrink: 0;
      flex-direction: column;
      gap: 4px;
      border-bottom: 1px solid #27272a;
      background: #09090b;
      padding: 6px;
    }

    .fm-path {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 4px;
      color: #a1a1aa;
      font-size: 10px;
    }

    .fm-path span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fm-root-button {
      height: 24px;
      flex-shrink: 0;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      background: #18181b;
      color: #f4f4f5;
      padding: 0 8px;
      font-size: 10px;
      white-space: nowrap;
    }

    .fm-root-button:active {
      background: #3f3f46;
    }

    .fm-row {
      display: flex;
      width: 100%;
      min-height: 36px;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #18181b;
      background: transparent;
      color: #f4f4f5;
      padding: 0 6px;
      text-align: left;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .fm-row:active {
      background: #27272a;
    }

    .fm-row.selected {
      background: rgba(127, 29, 29, 0.62);
      color: #ffffff;
    }

    .fm-row-main {
      min-width: 0;
      flex: 1 1 0;
    }

    .fm-row-title,
    .fm-row-sub {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fm-row-title {
      font-size: 11px;
      font-weight: 600;
    }

    .fm-row-sub {
      color: #71717a;
      font-size: 9px;
    }

    .fm-more {
      display: flex;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: #a1a1aa;
    }

    .fm-more:active {
      background: #3f3f46;
    }

    .fm-icon svg,
    [data-lucide] {
      width: 15px;
      height: 15px;
      stroke-width: 2;
    }

    .fm-dialog {
      max-height: calc(100vh - 76px);
    }

    .fm-editor-bar {
      display: flex;
      height: 32px;
      flex-shrink: 0;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid #27272a;
      background: #000;
      padding: 3px 6px;
    }

    .fm-tab {
      display: inline-flex;
      height: 26px;
      align-items: center;
      justify-content: center;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #a1a1aa;
      padding: 0 8px;
      font-size: 10px;
    }

    .fm-tab.active {
      border-color: #dc2626;
      background: #7f1d1d;
      color: #fff;
    }

    .fm-editor-shell,
    .fm-editor-view,
    .fm-preview,
    .fm-code-pane {
      height: 100%;
      min-height: 0;
    }

    .fm-editor-view {
      display: flex;
      flex-direction: column;
      background: #09090b;
    }

    .fm-preview {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      color: #e4e4e7;
    }

    .fm-code-pane {
      position: relative;
      overflow: hidden;
    }

    #codeEditor {
      position: absolute;
      inset: 0;
      font-size: 11px;
      line-height: 1.45;
    }

    .fm-media-preview {
      display: flex;
      height: 100%;
      min-height: 0;
      align-items: center;
      justify-content: center;
      overflow: auto;
      background: #050505;
      padding: 8px;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y pinch-zoom;
    }

    .fm-media-preview img,
    .fm-media-preview video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .fm-media-preview audio {
      width: 100%;
    }

    .fm-doc {
      min-height: 100%;
      background: #f8fafc;
      color: #111827;
      padding: 12px;
      font-size: 12px;
      line-height: 1.55;
    }

    .fm-doc.dark {
      background: #09090b;
      color: #e4e4e7;
    }

    .fm-doc pre {
      overflow: auto;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      padding: 10px;
      white-space: pre-wrap;
    }

    .fm-slide {
      margin: 0 0 10px;
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      background: #fff;
      padding: 8px;
    }

    .fm-slide b {
      color: #111827;
      font-size: 12px;
    }

    .fm-slide pre {
      margin: 8px 0 0;
    }

    .fm-table-wrap {
      height: 100%;
      overflow: auto;
      background: #f8fafc;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
    }

    .fm-table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      color: #111827;
      font-size: 11px;
    }

    .fm-table th,
    .fm-table td {
      max-width: 240px;
      border: 1px solid #d4d4d8;
      padding: 5px 7px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: top;
    }

    .fm-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #e4e4e7;
      font-weight: 600;
    }

    .fm-doc-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      border-bottom: 1px solid #d4d4d8;
      background: #f4f4f5;
      padding: 5px;
    }

    .fm-doc-tabs button {
      height: 24px;
      flex-shrink: 0;
      border: 1px solid #d4d4d8;
      border-radius: 5px;
      background: #fff;
      color: #111827;
      padding: 0 8px;
      font-size: 10px;
    }

    .fm-doc-tabs button.active {
      border-color: #991b1b;
      background: #991b1b;
      color: #fff;
    }

    .fm-empty-preview {
      display: flex;
      height: 100%;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      background: #09090b;
      color: #a1a1aa;
      padding: 14px;
    }

    .fm-empty-preview b {
      max-width: 100%;
      overflow: hidden;
      color: #f4f4f5;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main id="app" class="flex h-screen w-screen flex-col overflow-hidden bg-zinc-950 text-zinc-100">
    <header class="flex h-9 shrink-0 items-center gap-1 border-b border-zinc-800 bg-black px-1.5 text-white">
      <button class="cmd" data-action="refresh" title="刷新"><i data-lucide="refresh-cw"></i></button>
      <button class="cmd" data-action="mkdir" title="新建文件夹"><i data-lucide="folder-plus"></i></button>
      <button class="cmd" data-action="touch" title="新建文件"><i data-lucide="file-plus"></i></button>
      <button class="cmd" data-action="rename" title="重命名"><i data-lucide="pencil"></i></button>
      <button class="cmd danger" data-action="delete" title="删除"><i data-lucide="trash-2"></i></button>
      <button class="cmd" data-action="copy" title="复制到对侧"><i data-lucide="copy"></i></button>
      <button class="cmd" data-action="move" title="移动到对侧"><i data-lucide="move-right"></i></button>
      <div id="status" class="min-w-0 flex-1 truncate px-1 text-[10px] text-zinc-400">加载中</div>
    </header>

    <section id="panes" class="grid min-h-0 flex-1 grid-cols-2 overflow-hidden">
      <section id="left" class="min-w-0 border-r border-zinc-800"></section>
      <section id="right" class="min-w-0"></section>
    </section>

    <section id="editor" class="hidden h-[42vh] shrink-0 flex-col border-t border-zinc-800 bg-zinc-950">
      <div class="fm-editor-bar">
        <button id="saveButton" class="cmd primary" data-action="save" title="保存"><i data-lucide="save"></i></button>
        <button id="previewTab" class="fm-tab hidden" data-action="switch-view" data-view="preview">预览</button>
        <button id="sourceTab" class="fm-tab hidden" data-action="switch-view" data-view="source">源码</button>
        <button class="cmd" data-action="download-editing" title="打开/下载"><i data-lucide="download"></i></button>
        <button class="cmd" data-action="close-editor" title="关闭"><i data-lucide="x"></i></button>
        <div id="editPath" class="min-w-0 flex-1 truncate text-[10px] text-zinc-400"></div>
      </div>
      <div id="editBody" class="min-h-0 flex-1 overflow-hidden"></div>
    </section>

    <section id="sheet" class="hidden absolute inset-0 z-20 bg-black/35">
      <div class="absolute inset-x-2 bottom-2 overflow-hidden rounded-md border border-zinc-700 bg-zinc-950 shadow-2xl fm-dialog">
        <div class="flex h-8 items-center gap-2 border-b border-zinc-800 bg-black px-2">
          <i data-lucide="file-cog" class="text-zinc-300"></i>
          <div id="sheetTitle" class="min-w-0 flex-1 truncate text-[11px] font-medium text-zinc-100"></div>
          <button class="cmd" data-action="close-sheet" title="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="grid grid-cols-3 gap-1 p-2">
          <button class="sheetBtn" data-action="open-selected"><i data-lucide="external-link"></i><span>打开</span></button>
          <button class="sheetBtn" data-action="rename"><i data-lucide="pencil"></i><span>重命名</span></button>
          <button class="sheetBtn danger" data-action="delete"><i data-lucide="trash-2"></i><span>删除</span></button>
          <button class="sheetBtn" data-action="copy"><i data-lucide="copy"></i><span>复制</span></button>
          <button class="sheetBtn" data-action="move"><i data-lucide="move-right"></i><span>移动</span></button>
          <button class="sheetBtn" data-action="close-sheet"><i data-lucide="check"></i><span>完成</span></button>
        </div>
      </div>
    </section>
  </main>
  <script src="/assets/file-manager.js"></script>
</body>
</html>
